name: "Security"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  codeql:
    name: CodeQL Analysis
    # CodeQL autobuild is expensive; run it on merges to master and weekly
    # rather than on every PR. PRs are still gated by dependency review below.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  dependency-security:
    name: Dependency Security
    # dependency-review-action only runs on pull_request events, so this job is
    # PR-only; it keeps the fast per-PR supply-chain gate that CodeQL no longer provides.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev,viz]"

      - name: Run pip-audit
        run: |
          pip-audit --path .

      - name: Dependency Review
        uses: actions/dependency-review-action@v4 